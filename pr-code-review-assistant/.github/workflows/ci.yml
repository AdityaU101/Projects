name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r services/gateway/requirements.txt
          pip install -r services/fetcher/requirements.txt
          pip install -r services/analyzer/requirements.txt
          pip install -r tests/requirements-test.txt
      
      - name: Lint with basic checks
        run: |
          python -m py_compile services/gateway/app/*.py
          python -m py_compile services/fetcher/app/*.py
          python -m py_compile services/analyzer/app/*.py
      
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
