version: "3.8"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: prbot
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./services/gateway
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/prbot
      REDIS_URL: redis://redis:6379
      FETCHER_URL: http://fetcher:8001
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/gateway/app:/app/app

  fetcher:
    build: ./services/fetcher
    ports: ["8001:8001"]
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/fetcher/app:/app/app

  analyzer:
    build: ./services/analyzer
    ports: ["8002:8002"]
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://user:pass@postgres:5432/prbot
      LLM_API_KEY: ${LLM_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/analyzer/app:/app/app

  worker:
    build: ./services/analyzer
    command: bash -c "pip install rq && rq worker -u redis://redis:6379 analyzer-queue"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://user:pass@postgres:5432/prbot
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      analyzer:
        condition: service_started
    volumes:
      - ./services/analyzer/app:/app/app

volumes:
  pgdata:
